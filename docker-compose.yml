version: '3.9'

services:
  db:
    image: postgres:15
    container_name: popcorn_dev_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: popcorn_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: popcorn_dev_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/popcorn_dev
    ports:
      - '3000:3000'

volumes:
  postgres_data:
