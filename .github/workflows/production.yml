name: Production Pipeline

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  production:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/testdb

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce coverage ≥ 85%
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Coverage file not found"
            exit 1
          fi

          COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          COVERAGE_INT=${COVERAGE%.*}
          echo "Coverage is $COVERAGE%"

          if  [ "$COVERAGE_INT" -lt 85 ]; then
            echo "Coverage below 85%"
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t app-prod:${{ github.sha }} .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag image
        run: docker tag app-prod:${{ github.sha }} ghcr.io/hidalgo87/popcorn-api:${{ github.sha }}

      - name: Push image
        run: docker push ghcr.io/hidalgo87/popcorn-api:${{ github.sha }}
